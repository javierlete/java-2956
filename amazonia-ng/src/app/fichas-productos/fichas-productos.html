<main class="container my-5">
    @if (!productos) {
    <p class="lead fs-1">No se ha encontrado ningún producto</p>
    }
    <div class="row row-cols-1 row-cols-md-3 g-4">
        @for(p of productos; track p.id) {
        <div class="col">
            <div class="card h-100">
                <img src="http://localhost:8080/fotos/{{p.id}}.jpg" height="300" width="400" class="card-img-top"
                    alt="..." style="object-fit: cover">
                <div class="card-body">
                    <h5 class="card-title">{{p.nombre}}</h5>
                    <p class="card-text">{{p.descripcion}}</p>
                    <p class="card-text">
                        <a class="btn btn-primary stretched-link" routerLink="/productos/{{p.id}}">Ver en
                            detalle</a>
                    </p>
                    <p class="card-text lead">{{p.categoria}}</p>
                </div>
                <div class="card-footer">
                    <small class="text-body-secondary">{{p.precio | currency: 'EUR' : 'symbol' : '1.2-2' : 'es' }}</small>
                </div>
            </div>
        </div>
        }
    </div>
</main>
