<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IparteX</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="imgs/chat.svg" rel="icon">
<link href="css/bootstrap.min.css" rel="stylesheet">
<link href="css/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
	<nav class="navbar navbar-expand-sm bg-dark mb-5" data-bs-theme="dark">
		<div class="container-fluid">
			<a class="navbar-brand" href="javascript:mensajes()"><i class="bi bi-chat"></i>
				IparteX</a>
			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"
				aria-controls="navbarSupportedContent" aria-expanded="false"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarSupportedContent">
				<ul class="navbar-nav me-auto mb-2 mb-sm-0">
					<li class="nav-item"><a class="nav-link" href="javascript:mensajes()">Principal</a></li>
				</ul>
				<ul class="navbar-nav mb-2 mb-sm-0">
					<li id="menu-usuario" class="navbar-text d-none"><i class="bi bi-person"></i> <span></span></li>
					<li id="menu-logout" class="nav-item d-none"><a class="nav-link" href="javascript:logout()"><i
							class="bi bi-box-arrow-right"></i></a></li>
					<li id="menu-login" class="nav-item"><a class="nav-link" href="javascript:mostrarSeccion('login')"><i
							class="bi bi-box-arrow-in-right"></i></a></li>
				</ul>
			</div>
		</div>
	</nav>

	<main class="container">
		<section id="mensajes">
			<form class="d-none">
				<div class="row mb-2">
					<label for="texto" class="col-sm-2 col-form-label">Mensaje</label>
					<div class="col-sm">
						<textarea class="form-control" id="texto" name="texto" rows="5"></textarea>
					</div>
				</div>
				<div class="row mb-2">
					<div class="offset-sm-2 col-sm">
						<button class="btn btn-primary">Enviar</button>
					</div>
				</div>
			</form>

			<ul id="listado-mensajes" class="list-group list-group mb-4">

			</ul>
		</section>

		<section id="login">
			<form action="login" method="post">
				<div class="row mb-2">
					<label for="email" class="col-sm-2 col-form-label">Email</label>
					<div class="col-sm">
						<input type="email" class="form-control" id="email" name="email">
					</div>
				</div>
				<div class="row mb-2">
					<label for="password" class="col-sm-2 col-form-label">Contraseña</label>
					<div class="col-sm">
						<input type="password" class="form-control" id="password" name="password">
					</div>
				</div>
				<div class="row mb-2">
					<div class="offset-sm-2 col-sm">
						<button class="btn btn-primary">Iniciar sesión</button>
					</div>
				</div>
			</form>
		</section>
	</main>

	<footer
		class="mt-5 p-2 text-bg-dark d-flex justify-content-between align-items-baseline">
		<p>&copy;2026 Javier Lete</p>
		<ul class="nav">
			<li class="nav-item"><a class="nav-link text-light" href="#"><i
					class="bi bi-facebook"></i></a></li>
			<li class="nav-item"><a class="nav-link text-light" href="#"><i
					class="bi bi-twitter-x"></i></a></li>
			<li class="nav-item"><a class="nav-link text-light" href="#"><i
					class="bi bi-youtube"></i></a></li>
			<li class="nav-item"><a class="nav-link text-light" href="#"><i
					class="bi bi-instagram"></i></a></li>
			<li class="nav-item"><a class="nav-link text-light" href="#"><i
					class="bi bi-tiktok"></i></a></li>
		</ul>
	</footer>
	<script src="js/bootstrap.bundle.min.js"></script>
	<script src="js/ipartex.js"></script>
</body>
</html>
