<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
	th:replace="~{_global :: plantilla(~{::title}, ~{::main})}">
<title>Amazonia: Producto</title>
<main class="container my-5">
	<div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show"
		role="alert">
		Usuario o contraseña no encontrados
		<button type="button" class="btn-close" data-bs-dismiss="alert"
			aria-label="Close"></button>
	</div>

	<div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show"
		role="alert">
		Se ha cerrado la sesión correctamente
		<button type="button" class="btn-close" data-bs-dismiss="alert"
			aria-label="Close"></button>
	</div>

	<form th:action="@{/login}" th:method="post" th:object="${usuarioLogin}">
		<div
			th:replace="~{_fragmentos :: labelInput('Usuario', 'text', 'username', null)}"></div>
		<div
			th:replace="~{_fragmentos :: labelInput('Contraseña', 'password', 'password', null)}"></div>

		<div
			th:replace="~{_fragmentos :: labelInput('Iniciar sesión', 'submit', null, null)}"></div>
	</form>

</main>
