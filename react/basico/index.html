<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <title>React en una sola página</title>

    <!-- React y ReactDOM desde CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel para permitir JSX directamente en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [titulo, setTitulo] = React.useState('NO SE HA DETECTADO NADA');

            function pulsacionBoton() {
                console.log('App ha detectado que Boton se ha pulsado');

                setTitulo('BOTÓN PULSADO');
            }

            return <>
                <Titulo texto="Primero" />
                <Titulo texto="Segundo" />
                <Titulo texto="Tercero" />
                <Titulo texto={titulo} />
                <Boton pulsacion={pulsacionBoton} />
            </>;
        }

        function Titulo({ texto }) {
            return <h1>{texto}</h1>;
        }

        function Boton({pulsacion}) {
            function botonPulsado() {
                console.log('Botón pulsado');

                pulsacion();
            }

            return <button onClick={botonPulsado}>Púlsame</button>;
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>

</html>
